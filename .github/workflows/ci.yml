name: CI

on:
  push:
    branches: ["main", "feature/**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Test Python scripts
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov

      - name: Run SLO calculator tests
        run: |
          python -m pytest tests/test_slo_calculator.py -v \
            --cov=scripts \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: coverage.xml

      - name: Smoke-test CLI scripts
        run: |
          echo "--- SLO Calculator ---"
          python3 scripts/slo_calculator.py --slo 99.9 --window 30 --consumed-minutes 8.2

          echo "--- SLO Calculator JSON ---"
          python3 scripts/slo_calculator.py --slo 99.95 --window 30 --json | python3 -m json.tool

          echo "--- Incident Timeline (empty input) ---"
          echo '{"ts":"2026-03-18T14:00:00Z","type":"alert_fired","msg":"SLO burn 14.4x","actor":"prometheus"}
          {"ts":"2026-03-18T14:05:00Z","type":"acknowledged","msg":"Page acknowledged","actor":"alice"}
          {"ts":"2026-03-18T14:20:00Z","type":"identified","msg":"Root cause: bad deploy","actor":"alice"}
          {"ts":"2026-03-18T14:25:00Z","type":"mitigated","msg":"Rollback complete","actor":"alice"}
          {"ts":"2026-03-18T14:45:00Z","type":"resolved","msg":"Error rate nominal","actor":"alice"}' > /tmp/test_incident.jsonl
          python3 scripts/incident_timeline.py /tmp/test_incident.jsonl --incident-id INC-0001

          echo "--- Toil Tracker ---"
          python3 scripts/toil_tracker.py --db-path /tmp/test_toil.jsonl log \
            --type manual-deploy \
            --duration 30 \
            --automatable yes \
            --description "CI smoke test" \
            --engineer ci-bot
          python3 scripts/toil_tracker.py --db-path /tmp/test_toil.jsonl summary --weeks 1
          python3 scripts/toil_tracker.py --db-path /tmp/test_toil.jsonl opportunities

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linters
        run: |
          pip install ruff pyflakes

      - name: Run ruff
        run: ruff check scripts/ tests/

      - name: Run pyflakes
        run: python3 -m pyflakes scripts/ tests/

  validate-runbooks:
    name: Validate runbooks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check all runbooks have required sections
        run: |
          ERRORS=0
          for file in runbooks/*.md; do
            echo "Checking $file..."

            # Every runbook must have an Overview section
            if ! grep -q "^## Overview" "$file"; then
              echo "  FAIL: Missing '## Overview' section"
              ERRORS=$((ERRORS + 1))
            fi

            # Every runbook must have a Detection section
            if ! grep -q "^## [0-9]\+\. Detection\|^## Detection" "$file"; then
              echo "  FAIL: Missing Detection section"
              ERRORS=$((ERRORS + 1))
            fi

            # Every runbook must link to at least one related runbook
            if ! grep -q "^## Related Runbooks" "$file"; then
              echo "  FAIL: Missing 'Related Runbooks' section"
              ERRORS=$((ERRORS + 1))
            fi

            echo "  OK"
          done

          if [ "$ERRORS" -gt "0" ]; then
            echo "Found $ERRORS runbook validation errors"
            exit 1
          fi
          echo "All runbooks valid."

      - name: Check post-mortem template completeness
        run: |
          TEMPLATE="post-mortems/TEMPLATE.md"
          REQUIRED_SECTIONS=(
            "## Impact"
            "## Timeline"
            "## Root Cause Analysis"
            "## Action Items"
            "## What Went Well"
            "## Lessons Learned"
          )

          ERRORS=0
          for section in "${REQUIRED_SECTIONS[@]}"; do
            if ! grep -qF "$section" "$TEMPLATE"; then
              echo "FAIL: Missing '$section' in post-mortem template"
              ERRORS=$((ERRORS + 1))
            fi
          done

          if [ "$ERRORS" -gt "0" ]; then
            exit 1
          fi
          echo "Post-mortem template valid."
