name: SRE Playbooks CI

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }} — 40+ Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov

      - name: Run full test suite (40+ tests)
        run: |
          python -m pytest tests/ -v \
            --cov=runbooks \
            --cov-report=term-missing \
            --cov-report=xml \
            --tb=short

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.12'
        with:
          name: coverage-report
          path: coverage.xml

      - name: Smoke-test runbook CLIs
        run: |
          echo "--- Incident Response Demo ---"
          python3 runbooks/incident_response.py --demo

          echo "--- SLO Burn Rate Demo ---"
          python3 runbooks/slo_burn_rate.py --demo

          echo "--- Chaos Engineering Demo ---"
          python3 runbooks/chaos_engineering.py --demo

          echo "--- Escalation chain P0 ---"
          python3 runbooks/incident_response.py --severity P0

          echo "--- SLO burn rate calculation ---"
          python3 runbooks/slo_burn_rate.py --slo 99.9 --error-rate 0.0144

          echo "--- Blast radius ---"
          python3 runbooks/chaos_engineering.py --blast-radius --failure-mode network_partition

          echo "--- All GameDay templates ---"
          for scenario in network-partition pod-kill disk-fill cpu-spike; do
            python3 runbooks/chaos_engineering.py --scenario $scenario | head -5
          done

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint
        run: ruff check runbooks/ tests/ --output-format=github

      - name: Ruff format check
        run: ruff format --check runbooks/ tests/

  validate-runbooks:
    name: Validate Markdown Runbooks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check all runbooks have required sections
        run: |
          ERRORS=0
          for file in runbooks/*.md; do
            [ -f "$file" ] || continue
            echo "Checking $file..."

            if ! grep -q "^## Overview" "$file"; then
              echo "  FAIL: Missing '## Overview' section"
              ERRORS=$((ERRORS + 1))
            fi

            if ! grep -q "^## " "$file"; then
              echo "  FAIL: No sections found"
              ERRORS=$((ERRORS + 1))
            fi

            echo "  OK: $file"
          done

          if [ "$ERRORS" -gt "0" ]; then
            echo "Found $ERRORS runbook validation errors"
            exit 1
          fi
          echo "All runbooks valid."

      - name: Check PLAYBOOKS.md completeness
        run: |
          for section in "Database connection pool" "Memory leak" "Thundering herd" "Split-brain"; do
            if ! grep -q "$section" PLAYBOOKS.md; then
              echo "FAIL: Missing '$section' in PLAYBOOKS.md"
              exit 1
            fi
          done
          echo "PLAYBOOKS.md complete."
